name: Hourly Traffic Monitor

on:
  schedule:
    # Runs at 14 minutes past the hour from 05:00 to 20:00 UTC.
    # This completely avoids the massive GitHub queue at the top of the hour!
    - cron: '14 5-20 * * *'
  workflow_dispatch: 

jobs:
  run-monitor:
    runs-on: ubuntu-latest
    
    # Required permission to push the updated CSV back to your repository
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Python Libraries
        # We added pytz here to handle exact Belgian timezones!
        run: pip install requests pandas pytz

      - name: Run Traffic Monitor Script
        env:
          # Pulls the secret API key you added in GitHub Settings > Secrets
          TOMTOM_API_KEY: ${{ secrets.TOMTOM_API_KEY }}
        run: python traffic_monitor.py

      - name: Commit and Push Updated CSV
        run: |
          git config --global user.name "Traffic Bot"
          git config --global user.email "bot@traffic.local"
          git add traffic_data.csv
          # Only commits if the file has actually changed
          git diff --quiet && git diff --staged --quiet || git commit -m "📊 Appended new hourly traffic data"
          git push
